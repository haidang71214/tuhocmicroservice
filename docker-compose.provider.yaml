name: einvoice-provider

services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./docker/docker_data/mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - invoice_net

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: product_db
    volumes:
      - ./docker/docker_data/postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - invoice_net

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: keycloak-25.0.0
    ports:
      - "2000:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    restart: unless-stopped
    volumes:
      - ./docker/docker_data/keycloak_data:/opt/keycloak/data
    networks:
      - invoice_net
  redis:
    image: redis
    container_name: redis_server
    ports:
      - '6379:6379'
    networks:
      - invoice_net
    restart: unless-stopped
    volumes:
      - ./docker/docker_data/redis_data:/data

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight-ui
    ports:
      - '5540:5540'
    networks:
      - invoice_net
    depends_on:
      - redis
    volumes:
      - ./docker/docker_data/redisinsight_data:/data
networks:
  invoice_net:
    driver: bridge